<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>EXTRAVERSE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; width: 100%; height: 100%; }
    #boot {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: radial-gradient(ellipse at center, #0a0e18 0%, #000 80%);
      color: #cfd8e3; font-family: system-ui, sans-serif; cursor: pointer;
      z-index: 10; transition: opacity 0.6s ease; user-select: none;
    }
    #boot.hidden { opacity: 0; pointer-events: none; }
    #boot h1 { font-size: 2.2rem; letter-spacing: 0.5em; font-weight: 300; color: #ffc671; }
    #boot p { opacity: 0.7; font-size: 0.9rem; }
    #boot .err { color: #ff7b7b; max-width: 40rem; text-align: center; white-space: pre-wrap; }
    #hud-debug {
      position: fixed; top: 8px; left: 8px; color: #9fb4c8; z-index: 5;
      font: 11px/1.5 ui-monospace, monospace; pointer-events: none;
      text-shadow: 0 1px 2px #000; white-space: pre;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud-debug"></div>
  <div id="boot">
    <h1>EXTRAVERSE</h1>
    <p id="boot-status">Click to launch</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
